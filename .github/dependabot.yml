version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 0
    # We don't want dependabot to raise PRs — our auto-fix workflow
    # batches all non-major fixes into a single PR.
    # Dependabot still runs vulnerability scanning and creates alerts.
