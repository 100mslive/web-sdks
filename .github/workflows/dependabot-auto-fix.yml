name: Auto-fix Dependabot Alerts

on:
  schedule:
    - cron: '37 3 * * 1' # Monday 9:07 AM IST (3:37 UTC)
  workflow_dispatch:
  push:
    branches:
      - ci/dependabot-auto-fix # TEMP: remove before merging to main

permissions:
  contents: write
  pull-requests: write
  security-events: read

jobs:
  fix-vulnerabilities:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Fetch open dependabot alerts
        id: alerts
        run: |
          alerts=$(gh api repos/${{ github.repository }}/dependabot/alerts \
            --jq '[.[] | select(.state == "open") | {
              number: .number,
              severity: .security_advisory.severity,
              package: .dependency.package.name,
              summary: .security_advisory.summary
            }] | unique_by(.package)')

          count=$(echo "$alerts" | jq 'length')
          echo "total=$count" >> "$GITHUB_OUTPUT"

          if [ "$count" -eq 0 ]; then
            echo "No open alerts."
            exit 0
          fi

          echo "Open alerts ($count):"
          echo "$alerts" | jq -r '.[] | "  \(.severity) | \(.package) | \(.summary)"'
          echo "$alerts" > /tmp/alerts.json

      - name: Install packages
        if: steps.alerts.outputs.total != '0'
        run: yarn install --frozen-lockfile || yarn install

      - name: Apply fixes
        if: steps.alerts.outputs.total != '0'
        id: fix
        run: |
          FIXES=""
          MAJOR=""

          while IFS= read -r alert; do
            pkg=$(echo "$alert" | jq -r '.package')
            severity=$(echo "$alert" | jq -r '.severity')
            summary=$(echo "$alert" | jq -r '.summary')

            echo "→ $pkg ($severity)"

            # Get latest version from npm
            latest=$(npm view "$pkg" version 2>/dev/null || true)
            [ -z "$latest" ] && { echo "  skip: not on npm"; continue; }

            # Check if it's a direct dependency with a major bump
            current=$(jq -r --arg p "$pkg" '(.dependencies[$p] // .devDependencies[$p]) // empty' package.json)
            if [ -n "$current" ]; then
              cur_major=$(echo "$current" | sed 's/[^0-9]*//' | cut -d. -f1)
              new_major=$(echo "$latest" | cut -d. -f1)
              if [ "$cur_major" != "$new_major" ] && [ -n "$cur_major" ]; then
                MAJOR="${MAJOR}- \`$pkg\`: $current → $latest ($summary)\n"
                echo "  ⚠️ major bump, skipping"
                continue
              fi
            fi

            # Add/update resolution
            existing=$(jq -r --arg p "$pkg" '.resolutions[$p] // empty' package.json)
            if [ "$existing" = "^$latest" ]; then
              echo "  already resolved to ^$latest"
              continue
            fi

            jq --arg p "$pkg" --arg v "^$latest" '.resolutions[$p] = $v' package.json > package.json.tmp
            mv package.json.tmp package.json
            FIXES="${FIXES}- \`$pkg\`: → ^$latest ($severity — $summary)\n"
            echo "  ✅ resolved to ^$latest"
          done < <(jq -c '.[]' /tmp/alerts.json)

          if [ -z "$FIXES" ]; then
            echo "No new fixes to apply."
            echo "has_fixes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Reinstall
          yarn install

          echo "has_fixes=true" >> "$GITHUB_OUTPUT"
          printf '%b' "$FIXES" > /tmp/fixes.txt
          printf '%b' "$MAJOR" > /tmp/major.txt

      - name: Create or update PR
        if: steps.fix.outputs.has_fixes == 'true'
        run: |
          BRANCH="fix/dependabot-auto-$(date +%Y%m%d)"
          FIXES=$(cat /tmp/fixes.txt)
          MAJOR=$(cat /tmp/major.txt)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if branch already exists (re-run scenario)
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard origin/main
          else
            git checkout -b "$BRANCH"
          fi

          git add package.json yarn.lock
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }

          git commit -m "fix: resolve dependabot security vulnerabilities

          Fixes:
          $FIXES"

          git push -f origin "$BRANCH"

          MAJOR_SECTION=""
          if [ -n "$MAJOR" ]; then
            MAJOR_SECTION="
          ## Major updates (separate PRs needed)
          $MAJOR
          These require manual review due to breaking changes."
          fi

          # Create PR if it doesn't exist, update if it does
          existing_pr=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' || true)
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --body "## Summary
          Auto-fix for open Dependabot security alerts via yarn resolutions.

          ### Fixed
          $FIXES
          $MAJOR_SECTION

          ## Test plan
          - [ ] CI passes (lint, test, build)

          🤖 Auto-generated by dependabot-auto-fix workflow"
            echo "Updated PR #$existing_pr"
          else
            gh pr create \
              --title "fix: resolve dependabot security vulnerabilities" \
              --body "## Summary
          Auto-fix for open Dependabot security alerts via yarn resolutions.

          ### Fixed
          $FIXES
          $MAJOR_SECTION

          ## Test plan
          - [ ] CI passes (lint, test, build)

          🤖 Auto-generated by dependabot-auto-fix workflow" \
              --base main
          fi
