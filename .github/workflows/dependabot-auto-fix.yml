name: Auto-fix Dependabot Alerts

on:
  schedule:
    - cron: '37 3 * * 1' # Monday 9:07 AM IST (3:37 UTC)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-vulnerabilities:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install packages
        run: yarn install --frozen-lockfile || yarn install

      - name: Audit and fix vulnerabilities
        id: fix
        run: |
          set -uo pipefail

          echo "Running yarn audit..."
          audit_output=$(yarn audit --json 2>/dev/null || true)

          # Extract advisories from yarn audit NDJSON output
          advisories=$(echo "$audit_output" | jq -s '[.[] | select(.type == "auditAdvisory") | .data.advisory | {
            package: .module_name,
            severity: .severity,
            title: .title
          }] | unique_by(.package)' 2>/dev/null || echo "[]")

          count=$(echo "$advisories" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "No vulnerabilities found."
            echo "has_fixes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found $count vulnerable packages:"
          echo "$advisories" | jq -r '.[] | "  \(.severity) | \(.package) | \(.title)"'
          echo "$advisories" > /tmp/advisories.json

          FIXES=""
          MAJOR=""

          while IFS= read -r adv; do
            pkg=$(echo "$adv" | jq -r '.package')
            severity=$(echo "$adv" | jq -r '.severity')
            title=$(echo "$adv" | jq -r '.title')
            echo "→ $pkg ($severity)"

            latest=$(npm view "$pkg" version 2>/dev/null || true)
            [ -z "$latest" ] && { echo "  skip: not on npm"; continue; }

            # Check for major version bumps (direct AND transitive deps)
            # First check direct deps, then fall back to installed version
            current=$(jq -r --arg p "$pkg" '(.dependencies[$p] // .devDependencies[$p]) // empty' package.json)
            if [ -z "$current" ]; then
              # Transitive dep — check installed version from node_modules
              current=$(node -p "try{require('$pkg/package.json').version}catch(e){''}" 2>/dev/null || true)
            else
              # Strip semver range prefix for direct deps
              current=$(echo "$current" | sed 's/[^0-9]*//')
            fi
            if [ -n "$current" ]; then
              cur_major=$(echo "$current" | cut -d. -f1)
              new_major=$(echo "$latest" | cut -d. -f1)
              if [ "$cur_major" != "$new_major" ]; then
                MAJOR="${MAJOR}- \`$pkg\`: $current → $latest ($title)\n"
                echo "  ⚠️ major bump ($cur_major → $new_major), skipping"
                continue
              fi
            fi

            # Add/update resolution
            existing=$(jq -r --arg p "$pkg" '.resolutions[$p] // empty' package.json)
            if [ "$existing" = "^$latest" ]; then
              echo "  already resolved"
              continue
            fi

            jq --arg p "$pkg" --arg v "^$latest" '.resolutions[$p] = $v' package.json > package.json.tmp
            mv package.json.tmp package.json
            FIXES="${FIXES}- \`$pkg\`: → ^$latest ($severity — $title)\n"
            echo "  ✅ resolved to ^$latest"
          done < <(jq -c '.[]' /tmp/advisories.json)

          if [ -z "$FIXES" ]; then
            echo "No new fixes to apply."
            echo "has_fixes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Reinstall with new resolutions
          yarn install

          # Save PR body to file (multiline output via file)
          {
            echo "## Summary"
            echo "Auto-fix for security vulnerabilities via yarn resolutions."
            echo ""
            echo "### Fixed"
            printf '%b' "$FIXES"
            if [ -n "$MAJOR" ]; then
              echo ""
              echo "### Major updates (separate PRs needed)"
              printf '%b' "$MAJOR"
              echo "These require manual review due to breaking changes."
            fi
            echo ""
            echo "## Test plan"
            echo "- [ ] CI passes (lint, test, build)"
            echo ""
            echo "🤖 Auto-generated by dependabot-auto-fix workflow"
          } > /tmp/pr-body.md

          printf '%b' "$FIXES" > /tmp/commit-msg.txt
          echo "has_fixes=true" >> "$GITHUB_OUTPUT"

      - name: Create or update PR
        if: steps.fix.outputs.has_fixes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: |
            fix: resolve dependabot security vulnerabilities
          title: 'fix: resolve dependabot security vulnerabilities'
          body-path: /tmp/pr-body.md
          branch: fix/dependabot-auto
          delete-branch: true
