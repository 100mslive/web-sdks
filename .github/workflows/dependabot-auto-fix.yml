name: Auto-fix Dependabot Alerts

on:
  schedule:
    - cron: '37 3 * * 1' # Monday 9:07 AM IST (3:37 UTC)
  workflow_dispatch:
  push:
    branches:
      - ci/dependabot-auto-fix # TEMP: remove before merging to main

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-vulnerabilities:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install packages
        run: yarn install --frozen-lockfile || yarn install

      - name: Audit and fix vulnerabilities
        id: fix
        run: |
          set -uo pipefail

          # Use yarn/npm audit to find vulnerabilities — no GitHub API needed
          echo "Running npm audit..."
          audit_json=$(npm audit --json 2>/dev/null || true)
          vuln_count=$(echo "$audit_json" | jq '.metadata.vulnerabilities | to_entries | map(select(.key != "info" and .value > 0)) | length' 2>/dev/null || echo "0")

          if [ "$vuln_count" -eq 0 ]; then
            echo "No vulnerabilities found."
            echo "has_fixes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found vulnerabilities, processing..."

          FIXES=""
          MAJOR=""

          # Get list of vulnerable packages
          packages=$(echo "$audit_json" | jq -r '.vulnerabilities | to_entries[] | select(.value.severity != "info") | .key' 2>/dev/null || true)

          for pkg in $packages; do
            severity=$(echo "$audit_json" | jq -r --arg p "$pkg" '.vulnerabilities[$p].severity' 2>/dev/null || echo "unknown")
            title=$(echo "$audit_json" | jq -r --arg p "$pkg" '.vulnerabilities[$p].via[0] | if type == "object" then .title else . end' 2>/dev/null || echo "")
            fix_available=$(echo "$audit_json" | jq -r --arg p "$pkg" '.vulnerabilities[$p].fixAvailable' 2>/dev/null || echo "false")

            echo "→ $pkg ($severity) — $title"

            # Get latest version
            latest=$(npm view "$pkg" version 2>/dev/null || true)
            [ -z "$latest" ] && { echo "  skip: not on npm"; continue; }

            # Check for major version bump on direct deps
            current=$(jq -r --arg p "$pkg" '(.dependencies[$p] // .devDependencies[$p]) // empty' package.json)
            if [ -n "$current" ]; then
              cur_major=$(echo "$current" | sed 's/[^0-9]*//' | cut -d. -f1)
              new_major=$(echo "$latest" | cut -d. -f1)
              if [ "$cur_major" != "$new_major" ] && [ -n "$cur_major" ]; then
                MAJOR="${MAJOR}- \`$pkg\`: $current → $latest ($title)\n"
                echo "  ⚠️ major bump, skipping"
                continue
              fi
            fi

            # Add/update resolution
            existing=$(jq -r --arg p "$pkg" '.resolutions[$p] // empty' package.json)
            if [ "$existing" = "^$latest" ]; then
              echo "  already resolved"
              continue
            fi

            jq --arg p "$pkg" --arg v "^$latest" '.resolutions[$p] = $v' package.json > package.json.tmp
            mv package.json.tmp package.json
            FIXES="${FIXES}- \`$pkg\`: → ^$latest ($severity — $title)\n"
            echo "  ✅ resolved to ^$latest"
          done

          if [ -z "$FIXES" ]; then
            echo "No new fixes to apply."
            echo "has_fixes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Reinstall with updated resolutions
          yarn install

          # Quick sanity check
          yarn test || echo "⚠️ Tests had failures — check manually"
          yarn lint || echo "⚠️ Lint had failures — check manually"

          echo "has_fixes=true" >> "$GITHUB_OUTPUT"
          printf '%b' "$FIXES" > /tmp/fixes.txt
          printf '%b' "$MAJOR" > /tmp/major.txt

      - name: Create or update PR
        if: steps.fix.outputs.has_fixes == 'true'
        env:
          GH_TOKEN: ${{ secrets.DOCKER_GIT_TOKEN || github.token }}
        run: |
          BRANCH="fix/dependabot-auto-$(date +%Y%m%d)"
          FIXES=$(cat /tmp/fixes.txt)
          MAJOR=$(cat /tmp/major.txt)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Handle re-runs: reset existing branch
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "${{ github.ref }}"
          else
            git checkout -b "$BRANCH"
          fi

          git add package.json yarn.lock
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }

          git commit -m "fix: resolve dependabot security vulnerabilities

          $FIXES"

          git push -f origin "$BRANCH"

          MAJOR_SECTION=""
          if [ -n "$MAJOR" ]; then
            MAJOR_SECTION="
          ## Major updates (separate PRs needed)
          $MAJOR
          These require manual review due to breaking changes."
          fi

          BODY="## Summary
          Auto-fix for security vulnerabilities via yarn resolutions.

          ### Fixed
          $FIXES
          $MAJOR_SECTION

          ## Test plan
          - [ ] CI passes (lint, test, build)

          🤖 Auto-generated by dependabot-auto-fix workflow"

          # Create or update
          existing_pr=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$existing_pr" ] && [ "$existing_pr" != "null" ]; then
            gh pr edit "$existing_pr" --body "$BODY"
            echo "Updated PR #$existing_pr"
          else
            gh pr create --title "fix: resolve dependabot security vulnerabilities" --body "$BODY" --base main
          fi
