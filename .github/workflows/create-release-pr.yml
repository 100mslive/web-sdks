name: Create Release PR
on:
  workflow_dispatch:
    inputs:
      versionBump:
        description: 'which version to bump eg: prerelease, patch'
        required: true
        type: choice
        default: 'prerelease'
        options:
          - prerelease
          - patch
          - minor
          - major

jobs:
  create_pr:
    runs-on: ubuntu-latest
    steps:
      # - name: Validate branch
      #   if: github.event.inputs.versionBump != 'prerelease' && github.ref != 'refs/heads/dev'
      #   run: exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Install packages
        run: yarn install --frozen-lockfile

      - name: Sync prerelease base with npm
        if: github.event.inputs.versionBump == 'prerelease'
        run: node scripts/sync-prerelease-versions.js

      - name: Update versions
        env:
          BUMP: ${{ github.event.inputs.versionBump }}
        run: |
          yarn lerna version $BUMP --no-git-tag-version --exact --yes --no-private --force-publish
          # Sync all internal cross-references to match bumped versions
          node -e "
            const fs = require('fs');
            const glob = require('glob');
            const pkgs = glob.sync('packages/*/package.json').concat('examples/prebuilt-react-integration/package.json');
            // Build a map of package name -> new version
            const versionMap = {};
            for (const p of pkgs) {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              if (pkg.name && pkg.name.startsWith('@100mslive/')) {
                versionMap[pkg.name] = pkg.version;
              }
            }
            console.log('Version map:', JSON.stringify(versionMap, null, 2));
            // Update all internal dependency references
            for (const p of pkgs) {
              let changed = false;
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              for (const depType of ['dependencies', 'devDependencies', 'peerDependencies']) {
                if (!pkg[depType]) continue;
                for (const [dep, ver] of Object.entries(pkg[depType])) {
                  if (versionMap[dep] && ver !== versionMap[dep]) {
                    console.log(p + ': ' + dep + ' ' + ver + ' -> ' + versionMap[dep]);
                    pkg[depType][dep] = versionMap[dep];
                    changed = true;
                  }
                }
              }
              if (changed) {
                fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
              }
            }
          "

      - name: Get current version
        id: version
        run: |
          STORE_VERSION=$(cd packages/hms-video-store && node -p -e "require('./package.json').version")
          echo $STORE_VERSION
          echo "store_version=$STORE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.30.1'
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks

      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'ci: update versions for release'
          title: 'ci: update versions for release'
          body: |
            - @100mslive/hms-video-store - ${{ steps.version.outputs.store_version }}
          branch: ci/release
          delete-branch: true
