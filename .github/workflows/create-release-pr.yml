name: Create Release PR
on:
  workflow_dispatch:
    inputs:
      versionBump:
        description: 'which version to bump eg: prerelease, patch'
        required: true
        type: choice
        default: 'prerelease'
        options:
          - prerelease
          - patch
          - minor
          - major

jobs:
  create_pr:
    runs-on: ubuntu-latest
    steps:
      # - name: Validate branch
      #   if: github.event.inputs.versionBump != 'prerelease' && github.ref != 'refs/heads/dev'
      #   run: exit 1

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Install packages
        run: yarn install --frozen-lockfile

      - name: Sync prerelease base with npm
        if: github.event.inputs.versionBump == 'prerelease'
        run: |
          # Set all package versions to their latest npm alpha so lerna increments from there
          node -e "
            const { execSync } = require('child_process');
            const fs = require('fs');
            const glob = require('glob');
            const pkgs = glob.sync('packages/*/package.json');
            for (const p of pkgs) {
              const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
              if (pkg.private) continue;
              try {
                const alpha = execSync('npm view ' + pkg.name + ' dist-tags.alpha 2>/dev/null', { encoding: 'utf8' }).trim();
                if (alpha) {
                  console.log(pkg.name + ': ' + pkg.version + ' -> ' + alpha);
                  pkg.version = alpha;
                  fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
                }
              } catch(e) {}
            }
          "

      - name: Update versions
        env:
          BUMP: ${{ github.event.inputs.versionBump }}
        run: |
          yarn lerna version $BUMP --no-git-tag-version --exact --yes --no-private
          # Update internal dependency versions in package.json without modifying lockfile
          STORE_VERSION=$(node -p "require('./packages/hms-video-store/package.json').version")
          ROOMKIT_VERSION=$(node -p "require('./packages/roomkit-react/package.json').version")
          cd packages/hms-virtual-background && npm pkg set peerDependencies.@100mslive/hms-video-store=$STORE_VERSION && npm pkg set devDependencies.@100mslive/hms-video-store=$STORE_VERSION && cd ../..
          cd examples/prebuilt-react-integration && npm pkg set dependencies.@100mslive/roomkit-react=$ROOMKIT_VERSION && cd ../..

      - name: Get current version
        id: version
        run: |
          STORE_VERSION=$(cd packages/hms-video-store && node -p -e "require('./package.json').version")
          echo $STORE_VERSION
          echo "store_version=$STORE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.30.1'
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /usr/local/bin gitleaks

      - uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'ci: update versions for release'
          title: 'ci: update versions for release'
          body: |
            - @100mslive/hms-video-store - ${{ steps.version.outputs.store_version }}
          branch: ci/release
          branch-suffix: short-commit-hash
          delete-branch: true
